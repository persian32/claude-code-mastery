<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="순수 HTML/CSS/JS와 TailwindCSS로 만든 TODO 앱" />
  <title>TODO 앱</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 커스텀 스타일 -->
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <!-- 헤더: 앱 제목 및 남은 할 일 개수 -->
  <header class="bg-white shadow-sm">
    <div class="mx-auto max-w-2xl px-4 py-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-slate-900">📝 TODO 앱</h1>
      <p class="text-sm text-slate-500">
        남은 할 일 <span id="remainingCount" class="font-semibold text-indigo-600">0</span>개
      </p>
    </div>
  </header>

  <main class="mx-auto max-w-2xl px-4 py-6 space-y-6">
    <!-- 입력 영역: 5단계에서 카테고리/태그/마감일/우선순위 확장 예정 -->
    <section aria-labelledby="addFormTitle">
      <h2 id="addFormTitle" class="sr-only">할 일 추가</h2>
      <form id="addForm" class="bg-white rounded-lg shadow-sm p-4 space-y-3">
        <div class="flex gap-2">
          <input
            id="titleInput"
            type="text"
            name="title"
            placeholder="할 일을 입력하세요"
            aria-label="할 일 제목"
            class="flex-1 rounded-md border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            required
          />
          <button
            type="submit"
            class="rounded-md bg-indigo-600 px-4 py-2 text-white font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          >
            추가
          </button>
        </div>
      </form>
    </section>

    <!-- 툴바: 6단계에서 필터/정렬/검색 기능 연결 예정 -->
    <section aria-labelledby="toolbarTitle" class="bg-white rounded-lg shadow-sm p-4">
      <h2 id="toolbarTitle" class="sr-only">필터 및 정렬</h2>
      <div id="toolbar" class="flex flex-wrap items-center gap-3 text-sm text-slate-500">
        <span>필터 · 정렬 · 검색 (6단계에서 구현)</span>
      </div>
    </section>

    <!-- 목록: 3단계에서 렌더링 연결 예정 -->
    <section aria-labelledby="listTitle">
      <h2 id="listTitle" class="sr-only">할 일 목록</h2>
      <ul id="todoList" class="space-y-2"></ul>
      <!-- 목록이 비었을 때 안내 -->
      <p id="emptyMessage" class="text-center text-slate-400 py-10">
        등록된 할 일이 없습니다.
      </p>
    </section>
  </main>

  <!-- 푸터: 7단계에서 일괄 삭제/통계 연결 예정 -->
  <footer class="mx-auto max-w-2xl px-4 py-6 text-center text-xs text-slate-400">
    순수 HTML/CSS/JS + TailwindCSS로 제작
  </footer>

  <!-- JS 모듈: 단계별로 채워나갈 예정 -->
  <script src="./js/store.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/filter.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
